model:
  type: transformer
  vocab_size: 50257
  d_model: 1024
  num_heads: 16
  d_ff: 4096
  num_layers: 24
  max_seq_len: 1024
  dropout: 0.1
  tie_weights: true
  gradient_checkpointing: true

training:
  micro_batch_size: 4
  grad_accumulation_steps: 32
  max_steps: 76000
  lr: 6.0e-4
  min_lr_ratio: 0.1
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 2000
  grad_clip: 1.0
  mixed_precision: true
  eval_interval: 1000
  eval_steps: 50
  save_interval: 5000
  log_interval: 100

data:
  dataset: openwebtext
  seq_len: 1024
