model:
  type: mera
  vocab_size: 8192
  d_model: 256
  bond_dim: 64
  num_heads: 4
  num_scales: 3
  num_layers: 1
  d_ff: 1024
  max_seq_len: 128
  dropout: 0.1
  tie_weights: true

training:
  batch_size: 64
  epochs: 5
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_fraction: 0.05
  grad_clip: 1.0
  mixed_precision: true

data:
  dataset: wikitext-2
  tokenizer_vocab_size: 8192
  seq_len: 128
